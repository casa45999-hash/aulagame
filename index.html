<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aula Game</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Trebuchet MS',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;min-height:100vh;padding:16px;}
    .container{max-width:1240px;margin:auto;background:rgba(255,255,255,0.07);backdrop-filter:blur(10px);padding:24px;border-radius:20px;box-shadow:0 0 30px rgba(0,0,0,0.5);}
    h1{text-align:center;font-size:2rem;color:#38bdf8;text-shadow:0 0 12px #38bdf8;margin-bottom:6px;}
    .subtitle{text-align:center;color:#94a3b8;font-size:0.9rem;margin-bottom:20px;}
    .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .tab{padding:9px 16px;border-radius:12px;border:none;cursor:pointer;font-weight:bold;font-size:0.88rem;background:rgba(255,255,255,0.1);color:#cbd5e1;transition:all 0.2s;}
    .tab.active{background:#0ea5e9;color:white;}
    .panel{display:none;} .panel.active{display:block;}
    input,select{padding:9px 13px;border:none;border-radius:10px;font-size:0.92rem;background:#e2e8f0;color:#0f172a;}
    button{padding:9px 14px;border:none;border-radius:10px;font-size:0.88rem;font-weight:bold;cursor:pointer;transition:transform 0.15s,opacity 0.15s;}
    button:hover{transform:scale(1.04);opacity:0.92;}
    .btn-blue{background:#3b82f6;color:white;} .btn-green{background:#22c55e;color:white;}
    .btn-red{background:#ef4444;color:white;} .btn-gray{background:#64748b;color:white;}
    .btn-amber{background:#f59e0b;color:white;} .btn-purple{background:#a855f7;color:white;}
    .btn-teal{background:#14b8a6;color:white;}
    table{width:100%;border-collapse:collapse;border-radius:14px;overflow:hidden;margin-top:10px;}
    th{background:#0369a1;padding:11px 9px;font-size:0.82rem;white-space:nowrap;}
    td{padding:9px 7px;text-align:center;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07);font-size:0.88rem;}
    .top-panel{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
    #loginOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:999;}
    #loginBox{background:#1e293b;border:2px solid #38bdf8;border-radius:20px;padding:40px;text-align:center;min-width:320px;}
    #loginBox h2{color:#38bdf8;margin-bottom:8px;font-size:1.6rem;}
    #loginBox input{width:100%;margin:6px 0;background:#334155;color:white;border:1px solid #475569;}
    #errorMsg{color:#f87171;font-size:0.85rem;min-height:1.2em;margin-top:8px;}
    #mainContent{display:none;}
    .muted{color:#94a3b8;} .good{color:#4ade80;} .danger{color:#f87171;} .warning{color:#fbbf24;}
  </style>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h2>🔐 Aula Game</h2>
    <p>Colegio Calipso</p>
    <input type="password" id="pass1" placeholder="Código 1"/>
    <input type="password" id="pass2" placeholder="Código 2"/>
    <div id="errorMsg"></div>
    <button class="btn-blue" style="width:100%;margin-top:14px;font-size:1rem;" onclick="verificarAcceso()">Ingresar</button>
  </div>
</div>

<div id="mainContent">
<div class="container">
  <h1>🎮 Aula Game</h1>
  <div class="subtitle">Colegio Calipso</div>

  <div class="tabs">
    <button class="tab active" onclick="mostrarPanel('registro',this)">📋 Registro diario</button>
    <button class="tab" onclick="mostrarPanel('consolidado',this)">📊 Consolidado</button>
    <button class="tab" onclick="mostrarPanel('config',this)">⚙️ Config</button>
  </div>

  <!-- REGISTRO DIARIO -->
  <div id="panel-registro" class="panel active">
    <div class="top-panel">
      <input type="text" id="nombreInput" placeholder="Nombre del estudiante" style="min-width:190px;"/>
      <select id="gradoInput">
        <option value="">— Grupo —</option>
        <option>4-1</option><option>6-1</option><option>6-2</option>
        <option>7-1</option><option>7-2</option><option>8-1</option>
      </select>
      <button class="btn-blue" onclick="agregarEstudiante()">➕ Agregar</button>
    </div>

    <div class="top-panel" style="background:rgba(255,255,255,0.04);padding:12px;border-radius:12px;">
      <label style="color:#94a3b8;margin-right:10px;">🔍 Filtrar:</label>
      <select id="filtroGrupoRegistro" onchange="renderTabla()">
        <option value="todos">Todos los grupos</option>
        <option>4-1</option><option>6-1</option><option>6-2</option>
        <option>7-1</option><option>7-2</option><option>8-1</option>
      </select>
      <label style="color:#94a3b8;margin-left:20px;margin-right:10px;">📊 Ordenar:</label>
      <select id="ordenRegistro" onchange="renderTabla()">
        <option value="nombre">Nombre (A-Z)</option>
        <option value="positivos">Positivos (Mayor a menor)</option>
        <option value="xp">XP (Mayor a menor)</option>
      </select>
      <button class="btn-purple" onclick="verRanking()" style="margin-left:20px;">🏆 Ver ranking</button>
      <label class="btn-green" style="cursor:pointer;display:inline-block;padding:9px 14px;border-radius:10px;font-size:0.88rem;font-weight:bold;">
        📋 Importar CSV
        <input type="file" id="fileImportar" accept=".csv" style="display:none;" onchange="importarCSV(event)"/>
      </label>
      <button class="btn-gray" onclick="descargarPlantilla()">⬇️ Plantilla</button>
    </div>
    
    <table>
      <thead><tr>
        <th>#</th><th>Nombre</th><th>Grupo</th><th>XP</th>
        <th>➕ Pos.</th><th>✱ Neg.</th>
        <th>📋 Asistencia</th><th>🚶 Evasiones</th>
        <th>Acciones</th>
      </tr></thead>
      <tbody id="cuerpoTabla"></tbody>
    </table>
  </div>

  <!-- CONSOLIDADO -->
  <div id="panel-consolidado" class="panel">
    <div id="consolidadoContent"></div>
  </div>

  <!-- CONFIG -->
  <div id="panel-config" class="panel">
    <div style="max-width:520px;">
      <h3 style="color:#38bdf8;margin-bottom:12px;">Mis materias</h3>
      <p class="muted" style="font-size:0.85rem;margin-bottom:12px;">Agrega las materias que enseñas.</p>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <input type="text" id="nuevaMteria" placeholder="Ej: Language, Matemáticas, Arte" style="flex:1;"/>
        <button class="btn-green" onclick="agregarMateria()">➕ Agregar</button>
      </div>
      <div id="listaMaterias" style="background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px;"></div>

      <h3 style="color:#38bdf8;margin-bottom:12px;">Umbrales por grupo</h3>
      <div id="umbralesForm"></div>
      <button class="btn-blue" style="margin-top:12px;" onclick="guardarUmbrales()">💾 Guardar</button>
      <hr style="border-color:rgba(255,255,255,0.1);margin:24px 0;"/>
      <h3 style="color:#38bdf8;margin-bottom:12px;">Descargar respaldo</h3>
      <button class="btn-teal" onclick="exportarRespaldo()">⬇️ Exportar JSON</button>
    </div>
  </div>

</div>
</div>

<script>
const GRUPOS = ['4-1','6-1','6-2','7-1','7-2','8-1'];
const UMBRALES_DEFAULT = {'4-1':3,'6-1':10,'6-2':7,'7-1':6,'7-2':6,'8-1':5};

let PASS1 = localStorage.getItem('ag_p1') || 'Docente2026';
let PASS2 = localStorage.getItem('ag_p2') || 'AulaGameSecure';
let umbrales = JSON.parse(localStorage.getItem('ag_umbrales') || 'null') || {...UMBRALES_DEFAULT};
let estudiantes = [];
let registros = [];

// LOGIN
function verificarAcceso() {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  if (p1===PASS1 && p2===PASS2) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display  = 'block';
    init();
  } else {
    document.getElementById('errorMsg').textContent = '❌ Credenciales incorrectas.';
    document.getElementById('pass1').value = '';
    document.getElementById('pass2').value = '';
  }
}
document.getElementById('pass1').addEventListener('keydown', e=>{ if(e.key==='Enter') verificarAcceso(); });
document.getElementById('pass2').addEventListener('keydown', e=>{ if(e.key==='Enter') verificarAcceso(); });

// PERSISTENCIA
function cargarDatos() {
  estudiantes = JSON.parse(localStorage.getItem('ag_estudiantes') || '[]');
  registros   = JSON.parse(localStorage.getItem('ag_registros')   || '[]');
}

function guardar() {
  localStorage.setItem('ag_estudiantes', JSON.stringify(estudiantes));
  localStorage.setItem('ag_registros',   JSON.stringify(registros));
}

function exportarRespaldo() {
  const data = { estudiantes, registros, umbrales, exportado: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `AulaGame_respaldo_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// FUNCIONES
function hoy() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function horaActual() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function semanaActual() {
  const d = new Date();
  const onejan = new Date(d.getFullYear(),0,1);
  return `${d.getFullYear()}-S${Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7)}`;
}

function agregarEstudiante() {
  const nombre = document.getElementById('nombreInput').value.trim();
  const grado  = document.getElementById('gradoInput').value;
  if (!nombre||!grado) { alert('Completa nombre y grupo.'); return; }
  
  // Verificar duplicados
  const duplicado = estudiantes.find(e=>e.nombre.toLowerCase()===nombre.toLowerCase() && e.grado===grado);
  if (duplicado) { alert('⚠️ Este estudiante ya existe en este grupo.'); return; }
  
  const id = Date.now()+Math.random();
  estudiantes.push({id,nombre,grado,xp:0,posSemanales:0,evasiones:0,asistencias:{},negHoy:0,negPorDia:{}});
  document.getElementById('nombreInput').value='';
  guardar(); renderTabla();
}

function addPos(idx) {
  const est = estudiantes[idx];
  est.xp = (est.xp||0)+10;
  est.posSemanales = (est.posSemanales||0)+1;
  registros.push({estudianteId:est.id,nombre:est.nombre,grado:est.grado,tipo:'pos',motivo:'Positivo',fecha:hoy(),hora:horaActual(),semana:semanaActual()});
  guardar(); renderTabla();
}

function addNeg(idx) {
  const est = estudiantes[idx];
  registros.push({estudianteId:est.id,nombre:est.nombre,grado:est.grado,tipo:'neg',motivo:'Negativo',fecha:hoy(),hora:horaActual(),semana:semanaActual()});
  guardar(); renderTabla();
}

function registrarAsistencia(idx, estado) {
  const est = estudiantes[idx];
  if (!est.asistencias) est.asistencias = {};
  est.asistencias[hoy()] = estado;
  registros.push({estudianteId:est.id,nombre:est.nombre,grado:est.grado,tipo:'asistencia',motivo:estado.toUpperCase(),fecha:hoy(),hora:horaActual(),semana:semanaActual()});
  guardar(); renderTabla();
}

function registrarEvasion(idx) {
  const est = estudiantes[idx];
  est.evasiones = (est.evasiones||0)+1;
  registros.push({estudianteId:est.id,nombre:est.nombre,grado:est.grado,tipo:'evasion',motivo:'Evasión de clase',fecha:hoy(),hora:horaActual(),semana:semanaActual()});
  guardar(); renderTabla();
  alert(`⚠️ ${est.nombre} tiene ${est.evasiones} evasión(es)`);
}

function eliminar(idx) {
  const est = estudiantes[idx];
  if (!confirm(`¿Eliminar a ${est.nombre} del grupo ${est.grado}? Se perderán todos sus registros.`)) return;
  const id = est.id;
  estudiantes.splice(idx,1);
  registros = registros.filter(r=>r.estudianteId!==id);
  guardar(); renderTabla();
  alert(`✅ ${est.nombre} eliminado correctamente.`);
}

// RENDER TABLA
function renderTabla() {
  const tbody = document.getElementById('cuerpoTabla');
  const filtroGrupo = document.getElementById('filtroGrupoRegistro') ? document.getElementById('filtroGrupoRegistro').value : 'todos';
  const orden = document.getElementById('ordenRegistro') ? document.getElementById('ordenRegistro').value : 'nombre';
  
  // Aplicar filtro por grupo
  let lista = estudiantes;
  if (filtroGrupo !== 'todos') {
    lista = estudiantes.filter(e => e.grado === filtroGrupo);
  }
  
  // Aplicar ordenamiento
  if (orden === 'nombre') {
    lista.sort((a, b) => a.nombre.localeCompare(b.nombre));
  } else if (orden === 'positivos') {
    lista.sort((a, b) => (b.posSemanales || 0) - (a.posSemanales || 0));
  } else if (orden === 'xp') {
    lista.sort((a, b) => (b.xp || 0) - (a.xp || 0));
  }
  
  if (!lista.length) { tbody.innerHTML='<tr><td colspan="9" class="muted">No hay estudiantes en este grupo</td></tr>'; return; }

  tbody.innerHTML = lista.map((est)=>{
    const estIdx = estudiantes.indexOf(est);
    const posS = est.posSemanales||0;
    const negD = registros.filter(r=>r.estudianteId===est.id&&r.tipo==='neg'&&r.fecha===hoy()).length;
    const negMaxAlcanzado = negD >= 3;
    const asisHoy = est.asistencias ? est.asistencias[hoy()] : '';
    const asisDisplay = asisHoy ? (asisHoy==='presente'?'✅':asisHoy==='ausente'?'❌':'📋') : '—';
    
    return `<tr>
      <td>${idx+1}</td>
      <td style="text-align:left;">${est.nombre}</td>
      <td>${est.grado}</td>
      <td class="good">${est.xp||0}</td>
      <td>${posS}</td>
      <td class="${negD>=3?'danger':'good'}" style="font-weight:bold;">
        ${negD >= 3 ? '⚠️ ' + negD : negD}/3
        ${negD >= 3 ? '<br><span style="font-size:0.7rem;color:#fbbf24;">OBSERVADOR</span>' : ''}
      </td>
      <td style="white-space:nowrap;">
        <button class="btn-teal" style="padding:5px 8px;font-size:0.75rem;" onclick="registrarAsistencia(${estIdx},'presente')">P</button>
        <button class="btn-gray" style="padding:5px 8px;font-size:0.75rem;" onclick="registrarAsistencia(${estIdx},'ausente')">A</button>
        <button class="btn-amber" style="padding:5px 8px;font-size:0.75rem;" onclick="registrarAsistencia(${estIdx},'justificada')">J</button>
      </td>
      <td style="font-weight:bold;color:#f87171;min-width:120px;">
        <span style="background:rgba(239,68,68,0.3);padding:8px 12px;border-radius:8px;margin-right:6px;font-size:1.1rem;">${est.evasiones||0}</span>
        <button class="btn-red" style="padding:8px 12px;" onclick="registrarEvasion(${estIdx})">+</button>
      </td>
      <td style="white-space:nowrap;">
        <button class="btn-green" style="padding:5px 8px;" onclick="addPos(${estIdx})">+</button>
        <button class="btn-red" style="padding:5px 8px;" onclick="addNeg(${estIdx})">*</button>
        <button class="btn-gray" style="padding:5px 8px;" onclick="eliminar(${estIdx})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

// CONSOLIDADO
function renderConsolidado() {
  const div = document.getElementById('consolidadoContent');
  const semana = semanaActual();
  
  // Agregamos selector de grupo
  let html = `<div style="margin-bottom:16px;">
    <label style="color:#94a3b8;margin-right:10px;">Filtrar por grupo:</label>
    <select id="filtroGrupoConsolidado" onchange="renderConsolidado()" style="padding:8px 12px;">
      <option value="todos">Todos los grupos</option>
      <option>4-1</option><option>6-1</option><option>6-2</option>
      <option>7-1</option><option>7-2</option><option>8-1</option>
    </select>
  </div>`;
  
  const filtroGrupo = document.getElementById('filtroGrupoConsolidado') ? document.getElementById('filtroGrupoConsolidado').value : 'todos';
  let listaFiltrada = estudiantes;
  if (filtroGrupo !== 'todos') {
    listaFiltrada = estudiantes.filter(e => e.grado === filtroGrupo);
  }
  
  html += `<h3 style="color:#38bdf8;margin-bottom:16px;">Semana ${semana} ${filtroGrupo !== 'todos' ? '- Grupo ' + filtroGrupo : ''}</h3>`;
  html += `<table><thead><tr>
    <th>#</th><th>Nombre</th><th>Grupo</th>
    <th>➕ Pos.</th><th>✱ Neg.</th><th>🚶 Evasiones</th>
    <th>📋 Asistencia</th><th>XP</th>
  </tr></thead><tbody>`;

  listaFiltrada.forEach((est,i)=>{
    const posS = est.posSemanales||0;
    const negTot = registros.filter(r=>r.estudianteId===est.id&&r.tipo==='neg'&&r.semana===semana).length;
    const asisSemanales = registros.filter(r=>r.estudianteId===est.id&&r.tipo==='asistencia'&&r.semana===semana);
    const presentes = asisSemanales.filter(r=>r.motivo==='PRESENTE').length;
    const ausentes = asisSemanales.filter(r=>r.motivo==='AUSENTE').length;
    const justificadas = asisSemanales.filter(r=>r.motivo==='JUSTIFICADA').length;
    
    html+=`<tr>
      <td>${i+1}</td>
      <td style="text-align:left;">${est.nombre}</td>
      <td>${est.grado}</td>
      <td class="good">${posS}</td>
      <td class="${negTot>0?'warning':''}">${negTot}</td>
      <td class="${est.evasiones>0?'danger':'muted'}">${est.evasiones||0}</td>
      <td style="font-size:0.82rem;color:#38bdf8;">P:${presentes} A:${ausentes} J:${justificadas}</td>
      <td class="good">${est.xp||0}</td>
    </tr>`;
  });
  
  // Estadísticas del grupo filtrado
  const totalPos = listaFiltrada.reduce((s,e)=>s+(e.posSemanales||0),0);
  const totalNeg = listaFiltrada.reduce((s,e)=>s+registros.filter(r=>r.estudianteId===e.id&&r.tipo==='neg'&&r.semana===semana).length,0);
  const totalEvas = listaFiltrada.reduce((s,e)=>s+(e.evasiones||0),0);
  
  html += `</tbody></table>`;
  html += `<div style="margin-top:16px;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;">
    <strong style="color:#38bdf8;">Resumen:</strong> 
    <span class="good">${listaFiltrada.length} estudiantes</span> · 
    <span style="color:#4ade80;">+${totalPos} positivos</span> · 
    <span style="color:#f87171;">*${totalNeg} negativos</span> · 
    <span style="color:#ef4444;">🚶 ${totalEvas} evasiones</span>
  </div>`;
  
  div.innerHTML = html;
}

// CONFIG
function renderUmbrales(){
  document.getElementById('umbralesForm').innerHTML=GRUPOS.map(g=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
      <label style="width:52px;font-weight:bold;color:#38bdf8;">${g}</label>
      <input type="number" id="u_${g}" value="${umbrales[g]||5}" min="1" max="30" style="width:72px;"/>
    </div>`).join('');
}

function guardarUmbrales(){
  GRUPOS.forEach(g=>{umbrales[g]=parseInt(document.getElementById(`u_${g}`).value);});
  localStorage.setItem('ag_umbrales',JSON.stringify(umbrales));
  alert('✅ Guardado');
}

// TABS
function mostrarPanel(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`panel-${id}`).classList.add('active');
  btn.classList.add('active');
  if(id==='consolidado') renderConsolidado();
  if(id==='config') renderUmbrales();
}

// MATERIAS
let materias = JSON.parse(localStorage.getItem('ag_materias') || '[]') || ['Language','Mi Meta','Peace'];

function agregarMateria() {
  const mteria = document.getElementById('nuevaMteria').value.trim();
  if (!mteria) { alert('Escribe el nombre de la materia.'); return; }
  if (materias.includes(mteria)) { alert('Esa materia ya existe.'); return; }
  materias.push(mteria);
  localStorage.setItem('ag_materias', JSON.stringify(materias));
  document.getElementById('nuevaMteria').value = '';
  renderListaMaterias();
}

function eliminarMateria(mteria) {
  materias = materias.filter(m => m !== mteria);
  localStorage.setItem('ag_materias', JSON.stringify(materias));
  renderListaMaterias();
}

function renderListaMaterias() {
  document.getElementById('listaMaterias').innerHTML = materias.map(m => `
    <div style="background:rgba(56,189,248,0.2);color:#38bdf8;padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;">
      ${m}
      <button class="btn-red" style="padding:3px 6px;font-size:0.7rem;" onclick="eliminarMateria('${m}')">✕</button>
    </div>`).join('');
}

// CSV IMPORT
function descargarPlantilla() {
  const csv = 'Nombre,Grupo\nJuan Pérez,4-1\nMaría López,6-1\n';
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'plantilla_estudiantes.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function importarCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const lines = ev.target.result.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const inicio = lines[0].toLowerCase().includes('nombre') ? 1 : 0;
      let agregados = 0;
      
      lines.slice(inicio).forEach(line => {
        const sep = line.includes(';') ? ';' : ',';
        const partes = line.split(sep).map(p => p.trim());
        const nombre = partes[0];
        const grado  = partes[1];
        
        if (!nombre || !grado) return;
        if (estudiantes.find(e => e.nombre.toLowerCase()===nombre.toLowerCase() && e.grado===grado)) return;
        
        const id = Date.now() + Math.random();
        estudiantes.push({id, nombre, grado, xp:0, posSemanales:0, evasiones:0, asistencias:{}, negHoy:0, negPorDia:{}});
        agregados++;
      });
      
      guardar(); renderTabla();
      alert(`✅ ${agregados} estudiantes importados.`);
    } catch(err) {
      alert('Error al leer el CSV.');
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

// RANKING
function verRanking() {
  const filtroGrupo = document.getElementById('filtroGrupoRegistro') ? document.getElementById('filtroGrupoRegistro').value : 'todos';
  
  // Aplicar filtro por grupo
  let lista = estudiantes;
  if (filtroGrupo !== 'todos') {
    lista = estudiantes.filter(e => e.grado === filtroGrupo);
  }
  
  // Ordenar por positivos (mayor a menor)
  const ranking = [...lista].sort((a, b) => (b.posSemanales || 0) - (a.posSemanales || 0));
  
  const tituloGrupo = filtroGrupo !== 'todos' ? ` - Grupo ${filtroGrupo}` : ' - Todos los grupos';
  
  let html = '<div style="max-width:600px;margin:20px auto;background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;">';
  html += `<h2 style="color:#f59e0b;text-align:center;margin-bottom:20px;">🏆 RANKING${tituloGrupo}</h2>`;
  html += '<table style="width:100%;border-collapse:collapse;">';
  html += '<thead><tr style="background:#f59e0b;color:#000;"><th style="padding:10px;">Posición</th><th style="padding:10px;">Estudiante</th><th style="padding:10px;">Grupo</th><th style="padding:10px;">Positivos</th><th style="padding:10px;">XP</th></tr></thead>';
  html += '<tbody>';
  
  if (ranking.length === 0) {
    html += '<tr><td colspan="5" style="padding:20px;text-align:center;color:#94a3b8;">No hay estudiantes en este grupo</td></tr>';
  } else {
    ranking.forEach((est, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1);
      html += `<tr style="background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.1);">
        <td style="padding:10px;text-align:center;font-weight:bold;color:#f59e0b;">${medal}</td>
        <td style="padding:10px;">${est.nombre}</td>
        <td style="padding:10px;text-align:center;">${est.grado}</td>
        <td style="padding:10px;text-align:center;color:#4ade80;font-weight:bold;">+${est.posSemanales||0}</td>
        <td style="padding:10px;text-align:center;color:#38bdf8;font-weight:bold;">${est.xp||0}</td>
      </tr>`;
    });
  }
  
  html += '</tbody></table></div>';
  
  // Mostrar en un alert estilo modal
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;';
  modal.innerHTML = `<div style="background:#1e293b;border:2px solid #f59e0b;border-radius:15px;padding:20px;max-height:80vh;overflow-y:auto;width:90%;max-width:700px;">${html}<button class="btn-blue" style="width:100%;margin-top:20px;" onclick="this.parentElement.parentElement.remove()">Cerrar</button></div>`;
  document.body.appendChild(modal);
}
